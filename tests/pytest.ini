[pytest]
# Base URL for the app under test (override with --base-url CLI flag)
base_url = http://localhost:5000

# Test markers for selective execution
markers =
    smoke: Quick health-check tests (< 30s total)
    ui: Browser-based UI tests requiring Playwright
    chat: Tests that send messages to agents (may be slow)
    navigation: Tab switching, page navigation tests
    panel: Reasoning panel and slide-out tests

# Playwright settings
# --browser chromium is the default; override with --browser firefox/webkit
# --headed runs with visible browser (useful for CUA visual verification)

# Screenshot on failure (useful for CUA diagnosis)
addopts = --screenshot=only-on-failure --output=tests/results
