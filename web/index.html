<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advance Insights — AAP Data Agent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="img/favicon.svg">
    <link rel="stylesheet" href="css/app.css">
    <script src="https://alcdn.msauth.net/browser/2.38.3/js/msal-browser.min.js"></script>
</head>
<body>
    <!-- Login Screen -->
    <div id="login-screen" class="login-screen">
        <div class="login-card">
            <img src="img/aap-logo.svg" alt="Advance Auto Parts" class="login-logo">
            <h1>Advance Insights</h1>
            <p>AAP Rewards & Loyalty Data Agent</p>
            <button id="login-btn" class="btn-primary" onclick="handleLogin()">
                Sign in with Microsoft
            </button>
        </div>
    </div>

    <!-- Main App (hidden until auth) -->
    <div id="app" class="app hidden">
        <!-- Top Bar — AAP wordmark style -->
        <header class="top-bar">
            <div class="top-bar-left">
                <button id="hamburger-btn" class="hamburger-btn" onclick="toggleSidebar()" aria-label="Open agent menu">
                    <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
                        <path d="M3 6h18v2H3V6zm0 5h18v2H3v-2zm0 5h18v2H3v-2z"/>
                    </svg>
                </button>
                <img src="img/aap-logo.svg" alt="AAP" class="top-bar-logo">
                <div class="top-bar-wordmark">
                    <span class="wordmark-primary">ADVANCE</span>
                    <span class="wordmark-secondary">INSIGHTS</span>
                </div>
                <span class="wordmark-divider"></span>
                <span class="wordmark-tagline">Rewards &amp; Loyalty Intelligence</span>
                <span id="active-agent-label" class="active-agent-label"></span>
            </div>
            <div class="top-bar-right">
                <button id="new-chat-btn" class="btn-icon" onclick="handleNewChat()" title="New conversation">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                        <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
                    </svg>
                </button>
                <button id="reasoning-toggle" class="btn-icon" onclick="toggleReasoning()" title="Show reasoning">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                        <path d="M11 17h2v-6h-2v6zm1-8q.425 0 .713-.288Q13 8.425 13 8t-.287-.713Q12.425 7 12 7t-.712.287Q11 7.575 11 8t.288.712Q11.575 9 12 9zm0 13q-2.075 0-3.9-.788-1.825-.787-3.175-2.137-1.35-1.35-2.137-3.175Q2 14.075 2 12t.788-3.9q.787-1.825 2.137-3.175 1.35-1.35 3.175-2.138Q9.925 2 12 2t3.9.787q1.825.788 3.175 2.138 1.35 1.35 2.137 3.175Q22 9.925 22 12t-.788 3.9q-.787 1.825-2.137 3.175-1.35 1.35-3.175 2.137Q14.075 22 12 22z"/>
                    </svg>
                </button>
                <span id="user-name" class="user-name"></span>
                <button id="logout-btn" class="btn-text" onclick="handleLogout()">Sign out</button>
            </div>
        </header>

        <!-- Sidebar overlay (mobile) -->
        <div id="sidebar-overlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>

        <!-- Agent Tab Strip (becomes sidebar on mobile) -->
        <nav class="tab-strip" id="tab-strip">
            <!-- Tabs injected by app.js -->
        </nav>

        <!-- Chat Area -->
        <main class="chat-area" id="chat-area">
            <!-- Messages injected by app.js -->
        </main>

        <!-- Reasoning Sidebar (right side) -->
        <aside class="reasoning-panel" id="reasoning-panel">
            <div class="reasoning-header">
                <h3>Agent Reasoning</h3>
                <button class="reasoning-close" onclick="toggleReasoning()" aria-label="Close reasoning panel">×</button>
            </div>
            <div class="reasoning-steps" id="reasoning-steps">
                <!-- Reasoning steps injected by app.js -->
            </div>
        </aside>

        <!-- Input Bar -->
        <footer class="input-bar">
            <button id="suggestions-chip" class="suggestions-chip hidden" onclick="scrollToSuggestions()" title="View sample questions">
                💡 Suggestions
            </button>
            <div class="input-wrapper">
                <textarea
                    id="message-input"
                    class="message-input"
                    placeholder="Ask a question..."
                    rows="1"
                    onkeydown="handleInputKeydown(event)"
                ></textarea>
                <button id="send-btn" class="send-btn" onclick="handleSend()" title="Send message">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                    </svg>
                </button>
            </div>
        </footer>
    </div>

    <!-- Scripts (order matters) -->
    <script src="config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/agent-client.js"></script>
    <script src="js/executive.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
