<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Spark plug body -->
  <rect x="19" y="4" width="10" height="8" rx="2" fill="#E86C00"/>
  <!-- Insulator (hex nut area) -->
  <polygon points="17,12 31,12 33,16 15,16" fill="#E86C00"/>
  <!-- Ceramic insulator -->
  <rect x="20" y="16" width="8" height="14" rx="1" fill="#E86C00"/>
  <!-- Electrode tip -->
