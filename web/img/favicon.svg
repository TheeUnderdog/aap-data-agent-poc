<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <circle cx="32" cy="32" r="32" fill="#1E1E1E"/>
  <g transform="translate(13, 10)">
    <!-- Flag pole -->
    <line x1="6" y1="6" x2="6" y2="46" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Waving flag shape (white base) -->
    <defs>
      <clipPath id="f">
        <path d="M6 6 C14 3, 22 10, 30 6 C34 4, 38 5, 40 4 L40 26 C38 27, 34 26, 30 28 C22 32, 14 25, 6 28 Z"/>
      </clipPath>
    </defs>
    <path d="M6 6 C14 3, 22 10, 30 6 C34 4, 38 5, 40 4 L40 26 C38 27, 34 26, 30 28 C22 32, 14 25, 6 28 Z" fill="#fff"/>
    <!-- Checkerboard pattern clipped to flag -->
    <g clip-path="url(#f)">
      <!-- Row 1: dark squares at cols 0, 2, 4 -->
      <rect x="6" y="4" width="5.7" height="5.5" fill="#1E1E1E"/>
      <rect x="17.4" y="4" width="5.7" height="5.5" fill="#1E1E1E"/>
      <rect x="28.8" y="4" width="5.7" height="5.5" fill="#1E1E1E"/>
      <!-- Row 2: dark squares at cols 1, 3, 5 -->
      <rect x="11.7" y="9.5" width="5.7" height="5.5" fill="#1E1E1E"/>
      <rect x="23.1" y="9.5" width="5.7" height="5.5" fill="#1E1E1E"/>
      <rect x="34.5" y="9.5" width="5.7" height="5.5" fill="#1E1E1E"/>
      <!-- Row 3: dark squares at cols 0, 2, 4 -->
      <rect x="6" y="15" width="5.7" height="5.5" fill="#1E1E1E"/>
      <rect x="17.4" y="15" width="5.7" height="5.5" fill="#1E1E1E"/>
      <rect x="28.8" y="15" width="5.7" height="5.5" fill="#1E1E1E"/>
      <!-- Row 4: dark squares at cols 1, 3, 5 -->
      <rect x="11.7" y="20.5" width="5.7" height="5.5" fill="#1E1E1E"/>
      <rect x="23.1" y="20.5" width="5.7" height="5.5" fill="#1E1E1E"/>
      <rect x="34.5" y="20.5" width="5.7" height="5.5" fill="#1E1E1E"/>
    </g>
    <!-- Speed/motion streaks -->
    <line x1="2" y1="34" x2="18" y2="34" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
    <line x1="5" y1="38" x2="24" y2="38" stroke="#fff" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
    <line x1="9" y1="42" x2="20" y2="42" stroke="#fff" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  </g>
</svg>
