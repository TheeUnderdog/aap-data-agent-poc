name: aap-loyalty-intelligence

services:
  web:
    build: ./web
    image: aap-loyalty-intelligence
    container_name: aap-loyalty-intelligence
    ports:
      - "8000:8000"
    env_file:
      - ./web/.env
    environment:
      - PORT=8000
    volumes:
      # Mount az cli tokens so DefaultAzureCredential can use AzureCliCredential inside Docker
      - ${USERPROFILE}/.azure:/root/.azure:ro
    restart: unless-stopped
